# .forge/manifest.yaml — eidos-mcp-registry
# Drag-and-drop MCP server scoping for Claude Code
# Generated by /forge-manifest-init on 2026-03-22

manifest_version: 1

repo:
  visibility: public
  org: eidos-agi
  topics: [mcp, claude-code, registry, model-context-protocol]

packaging:
  build_system: hatchling
  pypi:
    name: eidos-mcp-registry
    publish: true
    trusted_publisher:
      owner: eidos-agi
      repo: eidos-mcp-registry
      workflow: publish.yml
      environment: pypi
  readme:
    absolute_images: true

quality:
  required_files:
    - LICENSE
    - README.md
    - CHANGELOG.md
    - SECURITY.md
  min_grade:
    foss_check: B
    ship_check: pass
    sec_audit: clean

security:
  secret_scanning: true
  dependency_audit: true

dependencies:
  max_count: 5

ci:
  workflows:
    ci: true
    publish: true
  permissions:
    contents_read: true
  pre_commit: true
